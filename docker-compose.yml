version: "3.9"

services:
  # ── MongoDB (local stand-in for Cosmos DB) ─────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: localdev
      MONGO_INITDB_DATABASE: fragrance_db
    volumes:
      - mongo_data:/data/db

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://root:localdev@mongo:27017/fragrance_db?authSource=admin
      JWT_SECRET: local-dev-secret-change-in-prod
      FRAGRANCE_API_URL: https://api.fragella.com/api
      FRAGRANCE_API_KEY: ${FRAGRANCE_API_KEY}
      AI_API_KEY: ${AI_API_KEY}
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      - mongo
    volumes:
      # Hot-reload in dev: mount source so changes reflect without rebuild
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mongo_data:
