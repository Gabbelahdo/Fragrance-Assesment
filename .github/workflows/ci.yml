name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - run: npx tsc --noEmit

      - run: npm run build
        env:
          VITE_FRAGRANCE_API_URL: https://api.fragella.com/api
          VITE_FRAGRANCE_API_KEY: ${{ secrets.VITE_FRAGRANCE_API_KEY }}

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests
        env:
          MONGODB_URL: mongodb://localhost:27017/fragrance_test
          JWT_SECRET: test-secret
          FRAGRANCE_API_URL: https://api.fragella.com/api
          FRAGRANCE_API_KEY: test-key
          AI_API_KEY: test-key
        run: pytest tests/ -v
